<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="463.21667" height="348.70001" viewBox="0,0,463.21667,348.70001"><g transform="translate(-9.35004,-2.15002)"><g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" font-size="40" text-anchor="start" style="mix-blend-mode: normal"><text transform="translate(125.60008,344.60003) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#808080" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">Press space to continue</tspan></text><text transform="translate(9.60004,23.60002) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">If lapin has all powers, why is there a President ?</tspan></text><text transform="translate(18.45312,126) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">The President has powers and a role to play,</tspan><tspan x="0" dy="48px">for example, to choose ministers.</tspan><tspan x="0" dy="48px">Moreover, during his mandate, the President</tspan><tspan x="0" dy="48px">The President has immunity (judges cannot</tspan><tspan x="0" dy="48px">convict him), while lapin can be fined (but only</tspan><tspan x="0" dy="48px">receive fines, not be banned from the RoS, ...).</tspan></text></g></g></svg>
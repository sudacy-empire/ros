an elect a President and even</tspan><tspan x="0" dy="46.150000000000006px">propose and vote laws !</tspan><tspan x="0" dy="46.150000000000006px">However, lapin, the founder (and owner) of the </tspan><tspan x="0" dy="46.150000000000006px">Republic of Scratch is the Master of this</tspan><tspan x="0" dy="46.150000000000006px">"Scratch virtual country" and retains all powers.</tspan></text></g></g></svg>
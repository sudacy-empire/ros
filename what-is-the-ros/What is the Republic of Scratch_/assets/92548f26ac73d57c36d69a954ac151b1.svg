<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="467.23198" height="349.01896" viewBox="0,0,467.23198,349.01896"><g transform="translate(-6.14197,-0.15002)"><g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" font-size="40" text-anchor="start" style="mix-blend-mode: normal"><text transform="translate(174.60006,21.60002) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">Concretely ...</tspan></text><text transform="translate(7.47395,90) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">Police(wo)men can get differents tasks (report</tspan><tspan x="0" dy="48px">inappropriate comments, discuss with people</tspan><tspan x="0" dy="48px">that post inappropriate comments, recruit other</tspan><tspan x="0" dy="48px">police(wo)men, ...). Soldiers can, for example, be</tspan><tspan x="0" dy="48px">sent to attack enemy studios by reporting them.</tspan><tspan x="0" dy="48px">Messengers can transmit information to a group</tspan><tspan x="0" dy="48px">of people...</tspan><tspan x="0" dy="48px">For more information, see the description of the</tspan><tspan x="0" dy="48px">official studio of the Republic of Scratch.</tspan></text><text 